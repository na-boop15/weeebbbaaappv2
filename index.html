<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPUB 도구 모음</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .wrap { max-width: 560px; width: 100%; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #888; margin-bottom: 2rem; }
  .cards { display: flex; flex-direction: column; gap: 10px; }
  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #fff;
    border: 0.5px solid #ddd;
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #aaa; }
  .icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .purple { background: #EEEDFE; color: #534AB7; }
  .teal   { background: #E1F5EE; color: #0F6E56; }
  .coral  { background: #FAECE7; color: #993C1D; }
  .info { flex: 1; }
  .name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
  .desc { font-size: 13px; color: #888; line-height: 1.4; }
  .arrow { font-size: 18px; color: #ccc; flex-shrink: 0; }
  .footer { margin-top: 2rem; font-size: 12px; color: #bbb; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>EPUB 도구 모음</h1>
  <p class="sub">웹소설 EPUB 제작 및 편집 도구</p>
  <div class="cards">
    <a class="card" href="un_jung.html">
      <div class="icon purple">📄</div>
      <div class="info">
        <div class="name">언정 epub</div>
        <div class="desc">TXT → EPUB 변환. 본문 스타일, 시스템창, 장면전환 설정</div>
      </div>
      <div class="arrow">›</div>
    </a>
    <a class="card" href="kkp_pub.html">
      <div class="icon teal">📚</div>
      <div class="info">
        <div class="name">kkp epub</div>
        <div class="desc">EPUB 빌더. 목차 구성, 메타데이터 편집, CSS 수정</div>
      </div>
      <div class="arrow">›</div>
    </a>
    <a class="card" href="pub_merg.html">
      <div class="icon coral">🔧</div>
      <div class="info">
        <div class="name">펍변텍 &amp; 합치기</div>
        <div class="desc">EPUB 텍스트 추출 및 파일 합치기</div>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>
  <p class="footer">브라우저에서 로컬 처리 · 파일 업로드 없음</p>
</div>
</body>
</html>
